backend:
  name: github
  repo: nadia-pasha/calligraphy-portfolio
  branch: main
  base_url: https://auth.decapbridge.com
  auth_endpoint: auth

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

publish_mode: editorial_workflow

collections:
  - name: "site"
    label: "Site Content"
    files:
      - name: "site"
        label: "Main Content"
        file: "content/site.json"
        format: "json"
        fields:
          - { label: "Site Title", name: "siteTitle", widget: "string" }
          - { label: "Logo Text", name: "logoText", widget: "string" }
          - { label: "Hero Eyebrow", name: "heroEyebrow", widget: "string" }
          - { label: "Hero Heading", name: "heroHeading", widget: "string" }
          - { label: "Hero Copy", name: "heroCopy", widget: "text" }
          - { label: "Primary Button Text", name: "primaryButtonText", widget: "string" }
          - { label: "Primary Button Link", name: "primaryButtonLink", widget: "string" }
          - { label: "Secondary Button Text", name: "secondaryButtonText", widget: "string" }
          - { label: "Secondary Button Link", name: "secondaryButtonLink", widget: "string" }

          - { label: "Work Eyebrow", name: "workEyebrow", widget: "string" }
          - { label: "Work Heading", name: "workHeading", widget: "string" }

          - { label: "Statement Eyebrow", name: "statementEyebrow", widget: "string" }
          - { label: "Statement Heading", name: "statementHeading", widget: "string" }
          - { label: "Statement Paragraph 1", name: "statementParagraph1", widget: "text" }
          - { label: "Statement Paragraph 2", name: "statementParagraph2", widget: "text" }
          - { label: "Exhibitions Heading", name: "exhibitionsHeading", widget: "string" }
          - label: "Exhibitions"
            name: "exhibitions"
            widget: "list"
            field: { label: "Exhibition", name: "item", widget: "string" }
          - { label: "Commission Heading", name: "commissionHeading", widget: "string" }
          - { label: "Commission Text", name: "commissionText", widget: "text" }

          - { label: "About Eyebrow", name: "aboutEyebrow", widget: "string" }
          - { label: "About Heading", name: "aboutHeading", widget: "string" }
          - { label: "About Bio", name: "aboutBio", widget: "text" }
          - label: "Facts"
            name: "facts"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }

          - { label: "Contact Eyebrow", name: "contactEyebrow", widget: "string" }
          - { label: "Contact Heading", name: "contactHeading", widget: "string" }
          - { label: "Contact Intro", name: "contactIntro", widget: "text" }
          - { label: "Email", name: "contactEmail", widget: "string" }
          - { label: "Instagram URL", name: "instagramUrl", widget: "string" }
          - { label: "Behance URL", name: "behanceUrl", widget: "string" }
          - { label: "Footer Studio Name", name: "footerStudioName", widget: "string" }

  - name: "gallery"
    label: "Gallery"
    files:
      - name: "gallery"
        label: "Gallery Items"
        file: "content/gallery.json"
        format: "json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.title}} ({{fields.category}})"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Medium", name: "medium", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Flourish", value: "flourish" }
                  - { label: "Minimal", value: "minimal" }
                  - { label: "Experimental", value: "experimental" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "alt", widget: "string" }
